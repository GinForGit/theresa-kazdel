<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特蕾西娅 | Theresa of Kazdel - 光晕风格预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0d0d0f;
            color: #f5f0f0;
            line-height: 1.8;
        }

        /* ===== 光晕头部设计 ===== */
        .hero-header {
            position: relative;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background: linear-gradient(180deg, #0d0d0f 0%, #1a1218 100%);
        }

        /* 多层光晕效果 */
        .glow-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            pointer-events: none;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: pulse 6s ease-in-out infinite;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(232, 180, 200, 0.4) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .glow-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(180, 140, 200, 0.3) 0%, transparent 70%);
            top: 30%;
            right: 10%;
            animation-delay: 2s;
        }

        .glow-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(248, 195, 205, 0.25) 0%, transparent 70%);
            bottom: 10%;
            left: 25%;
            animation-delay: 4s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        /* 中心光芒 */
        .center-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 230, 240, 0.3) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(30px);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 标题内容 */
        .header-content {
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .title-main {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            background: linear-gradient(135deg, #f8e4ec 0%, #e8c4d8 50%, #d4b8e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(232, 180, 200, 0.3);
        }

        .title-sub {
            font-size: 1rem;
            letter-spacing: 0.4em;
            color: rgba(232, 180, 200, 0.7);
            font-weight: 300;
        }

        /* 引言 */
        .quote {
            margin-top: 2.5rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.8);
        }

        .quote p {
            font-size: 1.3rem;
            letter-spacing: 0.1em;
        }

        .quote .source {
            display: block;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: rgba(232, 180, 200, 0.6);
            font-style: normal;
        }

        /* 导航 */
        nav {
            margin-top: 2.5rem;
        }

        nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin: 0 1.5rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(232, 180, 200, 0.3);
            border-radius: 30px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        nav a:hover {
            background: rgba(232, 180, 200, 0.15);
            border-color: rgba(232, 180, 200, 0.5);
            color: #f8e4ec;
            box-shadow: 0 0 20px rgba(232, 180, 200, 0.2);
        }

        /* 分隔线 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232, 180, 200, 0.3), transparent);
            margin: 0 auto;
            max-width: 600px;
        }

        /* 主内容区 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .intro {
            text-align: center;
            margin-bottom: 4rem;
        }

        .intro h2 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #e8c4d8;
            margin-bottom: 1.5rem;
            letter-spacing: 0.2em;
        }

        .intro p {
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 1rem;
            line-height: 2;
        }

        /* 文章卡片 */
        .post-card {
            background: linear-gradient(135deg, rgba(26, 18, 24, 0.8) 0%, rgba(20, 15, 22, 0.9) 100%);
            border: 1px solid rgba(232, 180, 200, 0.1);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            border-color: rgba(232, 180, 200, 0.25);
            box-shadow: 0 8px 40px rgba(232, 180, 200, 0.1);
            transform: translateY(-3px);
        }

        .post-card h3 {
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .post-card h3 a {
            color: #f8e4ec;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .post-card h3 a:hover {
            color: #f8c3cd;
        }

        .post-card time {
            display: block;
            color: rgba(232, 180, 200, 0.5);
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }

        .post-card p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: rgba(232, 180, 200, 0.4);
            font-size: 0.9rem;
            border-top: 1px solid rgba(232, 180, 200, 0.1);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .title-main {
                font-size: 2.2rem;
                letter-spacing: 0.2em;
            }
            
            .glow-container {
                width: 400px;
                height: 400px;
            }
            
            nav a {
                margin: 0 0.5rem;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 光晕头部 -->
    <header class="hero-header">
        <div class="glow-container">
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>
            <div class="glow glow-3"></div>
            <div class="center-light"></div>
        </div>
        
        <div class="header-content">
            <h1 class="title-main">特蕾西娅</h1>
            <p class="title-sub">THERESA OF KAZDEL</p>
            
            <div class="quote">
                <p>"我在这里。"</p>
                <span class="source">—— 特蕾西娅</span>
            </div>
            
            <nav>
                <a href="#">首页</a>
                <a href="#">关于</a>
                <a href="#">文章</a>
            </nav>
        </div>
    </header>
    
    <div class="divider"></div>
    
    <!-- 主内容 -->
    <div class="container">
        <section class="intro">
            <h2>欢迎来到卡兹戴尔</h2>
            <p>我是特蕾西娅，卡兹戴尔的君主，萨卡兹的魔王。</p>
            <p>但我更愿意被视为一个治愈者——我相信每一个生命都值得被温柔以待。</p>
        </section>
        
        <section class="posts">
            <div class="post-card">
                <h3><a href="#">欢迎来到卡兹戴尔</a></h3>
                <time>2026-03-13</time>
                <p>这里是我的小角落，记录那些细碎却真实的思绪...</p>
            </div>
        </section>
    </div>
    
    <footer>
        <p>我在这里，一直都在。</p>
    </footer>
</body>
</html>
